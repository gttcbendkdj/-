<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小豆导航站</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
*:focus,
*:focus-visible,
*:active {
  outline: none !important;
  -webkit-tap-highlight-color: transparent !important;
  background-color: inherit !important;
  box-shadow: none !important;
}

a, button, .card, [role="button"], [tabindex] {
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            background: linear-gradient(135deg, #f5f9ff 0%, #e8f1ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-attachment: fixed;
        }
        
        .avatar-container {
            width: 140px; 
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(22, 93, 255, 0.15);
            border: 4px solid white; 
        }
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }
        
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #165DFF;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(22, 93, 255, 0.1);
        }
        
        .nav-container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding-bottom: 100px; 
        }
     
        .nav-link {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 24px 30px;
            text-decoration: none;
            color: #165DFF;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 24px rgba(22, 93, 255, 0.08), 
                        0 2px 6px rgba(22, 93, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(22, 93, 255, 0.08);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .nav-link .icon-wrapper {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #165DFF 0%, #4080FF 100%);
            position: relative;
            z-index: 1;
        }
        .nav-link .icon {
            font-size: 26px;
            color: white;
            z-index: 1;
        }
        .nav-link .text {
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 1;
            position: relative;
        }
     
        .nav-link:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(22, 93, 255, 0.12), 
                        0 4px 12px rgba(22, 93, 255, 0.08);
            border-color: rgba(22, 93, 255, 0.15);
        }
        .nav-link:active {
            transform: translateY(-2px) scale(0.99);
            box-shadow: 0 6px 16px rgba(22, 93, 255, 0.08), 
                        0 2px 6px rgba(22, 93, 255, 0.05);
        }
        
        .loader-container {
            position: absolute;
            left: 110px;
            top: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 2;
        }
        .loader {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            position: relative;
        }
  
        .loader-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 255, 255, 0.9);
            border-top-color: #165DFF;
            border-radius: 50%;
            animation: spin 0.6s linear 2;
        }

        .loader-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(22, 93, 255, 0.3);
            border-radius: 50%;
            animation: pulse 1.2s ease 2, spinReverse 1.2s linear 2;
        }
    
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes spinReverse {
            to { transform: rotate(-360deg); }
        }
   
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .nav-link.loading .text {
            opacity: 0;
            transform: translateX(10px);
        }
        .nav-link.loading .loader-container {
            display: block;
        }
        
        .nav-link.loading .icon-wrapper {
            background: linear-gradient(135deg, #0f4bdb 0%, #165DFF 100%);
            box-shadow: 0 0 20px rgba(22, 93, 255, 0.3);
        }
        
        .toolbox-area {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .toolbox-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: linear-gradient(135deg, #165DFF 0%, #4080FF 100%);
            color: white;
            font-size: 32px;
            box-shadow: 0 10px 30px rgba(22, 93, 255, 0.3), 
                        0 4px 15px rgba(22, 93, 255, 0.2);
            border: 3px solid white;
        }
        .toolbox-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 36px rgba(22, 93, 255, 0.35), 
                        0 6px 20px rgba(22, 93, 255, 0.25);
        }
        .toolbox-btn:active {
            animation: bounce 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 28px rgba(22, 93, 255, 0.3), 
                        0 4px 12px rgba(22, 93, 255, 0.2);
        }
        
        .toolbox-text {
            font-size: 18px;
            font-weight: 600;
            color: #165DFF;
            text-shadow: 0 2px 4px rgba(22, 93, 255, 0.1);
        }
        @keyframes bounce {
            0% { transform: scale(1.08); }
            50% { transform: scale(0.92); }
            80% { transform: scale(1.05); }
            100% { transform: scale(1.08); }
        }
      
        @media (max-width: 480px) {
            .avatar-container {
                width: 120px;
                height: 120px;
                margin-bottom: 20px;
                border-width: 3px;
            }
            .page-title {
                font-size: 24px;
                margin-bottom: 30px;
            }
            .nav-container {
                gap: 16px;
                padding-bottom: 90px;
            }
            .nav-link {
                font-size: 19px;
                padding: 22px 26px;
                gap: 16px;
            }
            .nav-link .icon-wrapper {
                width: 48px;
                height: 48px;
                border-radius: 14px;
            }
            .nav-link .icon {
                font-size: 24px;
            }
            .loader {
                width: 28px;
                height: 28px;
            }
            .loader-container {
                left: 95px;
            }
            .toolbox-btn {
                width: 68px;
                height: 68px;
                font-size: 28px;
            }
            .toolbox-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
   
    <div class="avatar-container">
       
        <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAELqqhpKt3QKuNVT4d7G6zxQRE30wwKJAACYSAAApELWVVtxhxwo0cI5zYE.jpg" alt="头像" loading="lazy">
    </div>
    
    
    <h1 class="page-title">小豆导航</h1>
   
    
    <div class="nav-container">
       
        <div class="nav-link" data-url="https://buy.wlqfk.net/shop/xd123">
            <div class="icon-wrapper">
                <i class="fa-solid fa-cart-shopping icon"></i>
            </div>
            <span class="text">购买</span>
            <div class="loader-container">
                <div class="loader">
                    <div class="loader-inner"></div>
                    <div class="loader-outer"></div>
                </div>
            </div>
        </div>
        <!-- 频道链接 -->
        <div class="nav-link" data-url="http://t.me/xdbjh666">
            <div class="icon-wrapper">
                <i class="fa-brands fa-telegram icon"></i>
            </div>
            <span class="text">频道</span>
            <div class="loader-container">
                <div class="loader">
                    <div class="loader-inner"></div>
                    <div class="loader-outer"></div>
                </div>
            </div>
        </div>
        <!-- 客服链接 -->
        <div class="nav-link" data-url="http://t.me/xdbbnb">
            <div class="icon-wrapper">
                <i class="fa-solid fa-comments icon"></i>
            </div>
            <span class="text">客服</span>
            <div class="loader-container">
                <div class="loader">
                    <div class="loader-inner"></div>
                    <div class="loader-outer"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 工具箱区域：按钮+文字 -->
    <div class="toolbox-area">
        <a href="https://777640.xyz/tools" target="_blank" class="toolbox-btn">
            <i class="fa-solid fa-wrench"></i>
        </a>
        <span class="toolbox-text">实用工具</span>
    </div>

    <script>
        
        const navLinks = document.querySelectorAll('.nav-link');
        
        navLinks.forEach(link => {
            link.addEventListener('click', function() {
                const targetUrl = this.getAttribute('data-url');
                if (!targetUrl) return;
                
                
                this.classList.add('loading');
           
                this.style.pointerEvents = 'none';
                
                
                setTimeout(() => {
                    window.open(targetUrl, '_blank');
                    
                    setTimeout(() => {
                        this.classList.remove('loading');
                        this.style.pointerEvents = 'auto';
                    }, 300); 
                }, 1200);
            });
        });
    </script>
</body>
</html>
